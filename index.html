<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Launcher Odal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&family=Lato:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 900px; height: 550px;
      font-family: 'Lato', sans-serif;
      background: #040810;
      color: #e8d5b0;
      overflow: hidden;
      user-select: none;
    }

    /* Fond océan / nuit */
    #bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 110%, #0d2a4a 0%, transparent 60%),
        radial-gradient(ellipse at 50% -20%, #0a1929 0%, transparent 60%),
        linear-gradient(180deg, #040810 0%, #070e1c 50%, #04080f 100%);
    }

    /* Lueur centrale dorée */
    #glow {
      position: absolute;
      left: 50%; top: 55%;
      transform: translate(-50%, -50%);
      width: 500px; height: 300px;
      background: radial-gradient(ellipse, rgba(180, 130, 30, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Lignes décoratives horizontales */
    #lines-top, #lines-bottom {
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,130,30,0.3), rgba(201,162,39,0.7), rgba(180,130,30,0.3), transparent);
    }
    #lines-top { top: 36px; }
    #lines-bottom { bottom: 36px; }

    /* Coin décoratif */
    .corner {
      position: absolute;
      width: 40px; height: 40px;
      border-color: rgba(201,162,39,0.4);
      border-style: solid;
    }
    .corner.tl { top: 44px; left: 14px; border-width: 1px 0 0 1px; }
    .corner.tr { top: 44px; right: 14px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 44px; left: 14px; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 44px; right: 14px; border-width: 0 1px 1px 0; }

    /* Étoiles / particules */
    #stars { position: absolute; inset: 0; pointer-events: none; }
    .star {
      position: absolute;
      background: #c9a227;
      border-radius: 50%;
      animation: twinkle ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.7; }
    }

    /* Barre de titre */
    #titlebar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      -webkit-app-region: drag;
      z-index: 10;
    }
    #titlebar span {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      color: rgba(201,162,39,0.5);
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .win-btn {
      -webkit-app-region: no-drag;
      background: none; border: none; cursor: pointer;
      color: rgba(201,162,39,0.4); font-size: 13px; padding: 4px 8px;
      border-radius: 3px; transition: all 0.2s;
    }
    .win-btn:hover { color: #c9a227; background: rgba(201,162,39,0.08); }
    #btn-close:hover { color: #e05a5a; background: rgba(224,90,90,0.1); }
    .win-btns { display: flex; gap: 2px; -webkit-app-region: no-drag; }

    /* Contenu */
    #content {
      position: absolute;
      inset: 36px 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    /* Symbole ancre / épée */
    .icon-symbol {
      font-size: 28px;
      color: rgba(201,162,39,0.6);
      letter-spacing: 16px;
      margin-bottom: -4px;
    }

    /* Titre ODAL */
    .server-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 10px;
      color: #c9a227;
      text-shadow:
        0 0 20px rgba(201,162,39,0.5),
        0 0 60px rgba(201,162,39,0.2),
        0 2px 4px rgba(0,0,0,0.8);
      line-height: 1;
    }

    /* Ligne décorative sous titre */
    .title-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: -4px 0 2px;
    }
    .title-divider span { color: rgba(201,162,39,0.5); font-size: 14px; }
    .title-divider::before, .title-divider::after {
      content: '';
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,162,39,0.5));
    }
    .title-divider::after { background: linear-gradient(270deg, transparent, rgba(201,162,39,0.5)); }

    .server-sub {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      color: rgba(201,162,39,0.45);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: -8px;
    }

    /* Info utilisateur */
    #user-info {
      font-size: 13px;
      color: rgba(232,213,176,0.6);
      letter-spacing: 1px;
      display: none;
      font-weight: 300;
    }
    #user-info strong { color: #c9a227; font-weight: 400; }

    /* Bouton principal */
    #btn-join {
      margin-top: 6px;
      background: linear-gradient(180deg, #c9a227 0%, #a07c18 50%, #8a6912 100%);
      color: #1a0e00;
      border: none;
      cursor: pointer;
      border-radius: 3px;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 14px 52px;
      width: 280px;
      position: relative;
      transition: all 0.2s;
      box-shadow:
        0 0 20px rgba(201,162,39,0.3),
        0 4px 12px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,220,100,0.4);
    }
    #btn-join::before {
      content: '⚓';
      margin-right: 10px;
      font-size: 13px;
    }
    #btn-join:hover {
      background: linear-gradient(180deg, #e0b830 0%, #c9a227 50%, #a07c18 100%);
      box-shadow:
        0 0 35px rgba(201,162,39,0.5),
        0 4px 16px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,220,100,0.5);
      transform: translateY(-1px);
    }
    #btn-join:active { transform: translateY(1px); }
    #btn-join:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Barre de progression */
    #progress-zone {
      width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      margin-top: 4px;
    }
    #progress-bar-bg {
      width: 100%;
      height: 3px;
      background: rgba(201,162,39,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #8a6912, #c9a227, #e0c050);
      border-radius: 2px;
      transition: width 0.3s ease;
      box-shadow: 0 0 8px rgba(201,162,39,0.6);
    }
    #status-text {
      font-size: 11px;
      color: rgba(201,162,39,0.4);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Cinzel', serif;
    }

    /* Bannière update */
    #update-banner {
      display: none;
      position: absolute;
      top: 36px; left: 0; right: 0;
      background: linear-gradient(90deg, rgba(201,162,39,0.15), rgba(201,162,39,0.08));
      border-bottom: 1px solid rgba(201,162,39,0.3);
      padding: 7px 16px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 5;
    }
    #update-banner span {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      color: rgba(201,162,39,0.8);
      letter-spacing: 2px;
    }
    #update-btn {
      background: rgba(201,162,39,0.2);
      border: 1px solid rgba(201,162,39,0.5);
      color: #c9a227;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 2px;
      padding: 4px 12px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #update-btn:hover { background: rgba(201,162,39,0.35); }

    /* Version */
    #version {
      position: absolute;
      bottom: 10px;
      right: 18px;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      color: rgba(201,162,39,0.2);
      letter-spacing: 2px;
    }

    /* Formulaires */
    #auth-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 280px;
    }
    .auth-view { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .auth-view.hidden { display: none; }
    .login-input {
      width: 100%;
      background: rgba(201,162,39,0.05);
      border: 1px solid rgba(201,162,39,0.25);
      border-radius: 3px;
      color: #e8d5b0;
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      user-select: text;
    }
    .login-input::placeholder { color: rgba(201,162,39,0.25); }
    .login-input:focus { border-color: rgba(201,162,39,0.6); background: rgba(201,162,39,0.08); }

    .password-field { position: relative; width: 100%; }
    .password-field .login-input { padding-right: 38px; }
    .toggle-pw {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      display: flex;
      color: rgba(232,213,176,0.55);
      transition: color 0.2s;
    }
    .toggle-pw svg { display: block; width: 17px; height: 17px; }
    .toggle-pw:hover { color: #e0c050; }
    .toggle-pw.active { color: #c9a227; }
    .auth-switch {
      font-size: 11px;
      color: rgba(201,162,39,0.35);
      text-align: center;
      margin-top: 2px;
      font-family: 'Cinzel', serif;
      letter-spacing: 1px;
    }
    .auth-switch button {
      background: none; border: none; cursor: pointer;
      color: rgba(201,162,39,0.7); font-family: 'Cinzel', serif;
      font-size: 11px; letter-spacing: 1px; padding: 0;
      text-decoration: underline;
    }
    .auth-switch button:hover { color: #c9a227; }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: rgba(232,213,176,0.5);
      letter-spacing: 0.5px;
      cursor: pointer;
      margin-top: -2px;
    }
    .remember-row input {
      accent-color: #c9a227;
      cursor: pointer;
    }

    #user-info {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #skin-head {
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
      border: 1px solid rgba(201,162,39,0.4);
      border-radius: 3px;
    }

    #settings-overlay {
      position: absolute;
      inset: 0;
      background: rgba(2,4,8,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      -webkit-app-region: no-drag;
    }
    #settings-overlay.hidden { display: none; }
    #settings-panel {
      width: 300px;
      background: linear-gradient(180deg, #0a1220 0%, #060a12 100%);
      border: 1px solid rgba(201,162,39,0.35);
      border-radius: 6px;
      padding: 22px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .settings-title {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      letter-spacing: 2px;
      color: #c9a227;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 2px;
    }
    .setting-row { display: flex; flex-direction: column; gap: 8px; }
    .setting-row label {
      font-size: 12px;
      color: rgba(232,213,176,0.7);
      letter-spacing: 0.5px;
    }
    .setting-row input[type="range"] {
      width: 100%;
      accent-color: #c9a227;
    }
    #settings-close {
      background: rgba(201,162,39,0.12);
      border: 1px solid rgba(201,162,39,0.4);
      color: #c9a227;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 9px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #settings-close:hover { background: rgba(201,162,39,0.22); }
  </style>
</head>
<body>

  <div id="update-banner">
    <span id="update-text">Mise à jour disponible</span>
    <button id="update-btn" onclick="doUpdate()">Télécharger</button>
  </div>

  <div id="bg"></div>
  <div id="glow"></div>
  <div id="stars"></div>
  <div id="lines-top"></div>
  <div id="lines-bottom"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div id="titlebar">
    <span>Odal · Launcher</span>
    <div class="win-btns">
      <button class="win-btn" id="btn-settings" title="Paramètres">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
      </button>
      <button class="win-btn" id="btn-min">—</button>
      <button class="win-btn" id="btn-close">✕</button>
    </div>
  </div>

  <div id="settings-overlay" class="hidden">
    <div id="settings-panel">
      <div class="settings-title">Paramètres</div>

      <div class="setting-row">
        <label>Mémoire allouée : <strong id="ram-value">4</strong> Go</label>
        <input type="range" id="ram-slider" min="1" max="16" step="1" value="4">
      </div>

      <label class="remember-row"><input type="checkbox" id="close-on-launch"> Fermer le launcher une fois le jeu lancé</label>

      <button id="settings-close">Fermer</button>
    </div>
  </div>

  <div id="content">
    <div class="icon-symbol">⚓ &nbsp; ⚔</div>
    <div class="server-name">ODAL</div>
    <div class="title-divider"><span>✦</span></div>
    <div class="server-sub">Minecraft 1.20.1 &nbsp;·&nbsp; Forge</div>

    <div id="user-info">
      <img id="skin-head" alt="">
      <span>Conquérant : <strong id="username-display"></strong></span>
    </div>

    <div id="auth-zone">
      <!-- Connexion -->
      <div id="login-view" class="auth-view">
        <input class="login-input" id="input-username" type="text" placeholder="Pseudo Minecraft" maxlength="16" autocomplete="username" spellcheck="false">
        <div class="password-field">
          <input class="login-input" id="input-password" type="password" placeholder="Mot de passe" autocomplete="current-password">
          <button type="button" class="toggle-pw" data-target="input-password"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <label class="remember-row"><input type="checkbox" id="remember-me"> Se souvenir de moi</label>
        <div class="auth-switch">Pas de compte ? <button onclick="switchAuth('register')">S'inscrire</button></div>
      </div>
      <!-- Inscription -->
      <div id="register-view" class="auth-view hidden">
        <input class="login-input" id="reg-username" type="text" placeholder="Pseudo Minecraft" maxlength="16" autocomplete="off" spellcheck="false">
        <input class="login-input" id="reg-email" type="email" placeholder="Adresse e-mail" autocomplete="email" spellcheck="false">
        <div class="password-field">
          <input class="login-input" id="reg-password" type="password" placeholder="Mot de passe (6 car. min)" autocomplete="new-password">
          <button type="button" class="toggle-pw" data-target="reg-password"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <div class="password-field">
          <input class="login-input" id="reg-confirm" type="password" placeholder="Confirmer le mot de passe" autocomplete="new-password">
          <button type="button" class="toggle-pw" data-target="reg-confirm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <div class="auth-switch">Déjà un compte ? <button onclick="switchAuth('login')">Se connecter</button></div>
      </div>
    </div>

    <button id="btn-join">Rejoindre Odal</button>

    <div id="progress-zone">
      <div id="progress-bar-bg"><div id="progress-bar"></div></div>
      <div id="status-text">En attente...</div>
    </div>
  </div>

  <div id="version">v1.0.0</div>

  <script src="renderer.js"></script>
</body>
</html>
